<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Portfolio</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #36393f;
        color: white;
        font-family: Arial, sans-serif;
      }

      header,
      footer {
        background-color: #45494f;
        text-align: center;
        padding: 1rem;
      }

      .container {
        max-width: 80%;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        align-items: center;
        padding: 1rem;
      }

      .card {
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
        margin: 1rem;
        padding: 1rem;
        background-color: #4c4f56;
        border-radius: 5px;
      }

      .card img {
        max-width: 100%;
        height: auto;
        width: auto;
        margin-bottom: 1rem;
      }

      header {
        background-color: #2b2e34;
      }

      nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 1rem;
        border-bottom: 2px solid white;
      }

      nav a {
        text-decoration: none;
        color: white;
        font-weight: bold;
        padding: 0.5rem;
        margin: 0 1rem;
        border-radius: 5px;
        background-color: #4c4f56;
      }

      nav a:hover {
        background-color: #3c424a;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Photography Portfolio</h1>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">About Me</a>
      <a href="#">Contact</a>
    </nav>

    <main class="container">
      <section class="card">
        <img
          src="https://images.unsplash.com/photo-1707692780109-f49f3f966530?q=80&w=1932&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Photo of a mountain landscape"
        />
        <h3>Mountain</h3>
        <p>Photographer: Kaden</p>
      </section>
      <section class="card">
        <!-- <img
         src="https://images.unsplash.com/photo-1707692780109-f49f3f966530?q=80&w=1932&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Photo of a beach landscape"
        /> --> 
        <h3>Beach</h3>
        <p>Photographer: Jane Doe</p>
      </section>
    </main>

    <footer>
      &copy; 2024 Portfolio
    </footer>
  </body>
</html>
